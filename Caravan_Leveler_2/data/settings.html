<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caravan - Leveler</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="main.js"></script>
    <script src="i18n.js"></script>
    <script src="settings.js"></script>
</head>
<body>
    <div class="card" id="card">
        <h1 data-i18n="page.settings">Settings &#128295;</h1>
        <div id="noScriptWarning"><h2 style="color:red;">JavaScript is disabled!!!</h2></div>
        <span id="ThresholdValue" style="display:none"></span>
        <div id="SetupContainer" class="modal">
            <div class="modal-content">

                <!-- Tab Navigation -->
                <div class="settings-tabs">
                    <button class="tab-btn active" onclick="switchTab('tab-basic')" data-tab="tab-basic" data-i18n="set.tab.basic">&#9881; Basic</button>
                    <button class="tab-btn" onclick="switchTab('tab-voltage')" data-tab="tab-voltage" data-i18n="set.tab.voltage">&#9889; Voltage</button>
                    <button class="tab-btn" onclick="switchTab('tab-wifi')" data-tab="tab-wifi" data-i18n="set.tab.wifi">&#128246; WiFi</button>
                    <button class="tab-btn" onclick="switchTab('tab-sensor')" data-tab="tab-sensor" data-i18n="set.tab.sensor">&#128279; Sensor</button>
                </div>

                <!-- Tab: Basic -->
                <div id="tab-basic" class="tab-content active">
                    <div class="settings-row">
                        <label data-i18n="set.range">Indicating Range</label>
                        <span class="brand-color" id="SliderValue"></span>&#176;
                    </div>
                    <input type="range" min="1" max="45" value="0" class="slider settings-slider" id="ThresholdSlider">
                    <div class="settings-row" data-tooltip="Enables the Micro-USB Serial Output with debugging information" data-i18n-tooltip="tip.serial">
                        <label data-i18n="set.serial">Serial Output</label>
                        <label class="toggle-switch">
                            <input type="checkbox" value="0" id="SerialOutput">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-row" data-tooltip="Smooths the level display to reduce jitter" data-i18n-tooltip="tip.damping">
                        <label data-i18n="set.damping">Damping</label>
                        <label class="toggle-switch">
                            <input type="checkbox" value="0" id="Damping">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-center">
                        <div class="settings-section-label" data-i18n="set.invert">Invert Axis</div>
                        <input type="number" value="0" min="0" max="3" id="InvertAxis" style="display:none">
                        <img src="mpu6050sml.png" id="mpu6050Image" class="mpu6050-image" onclick="rotateInvertAxis()" alt="MPU6050">
                        <div class="settings-hint" data-i18n="set.tap">Tap to rotate</div>
                    </div>
                </div>

                <!-- Tab: Voltage -->
                <div id="tab-voltage" class="tab-content">
                    <div class="settings-row" data-tooltip="Analog pin number for voltage measurement (0-36)" data-i18n-tooltip="tip.vpin">
                        <label data-i18n="set.vpin">Voltage Pin</label>
                        <input type="number" value="0" min="0" max="36" id="VoltagePin">
                    </div>
                    <div class="settings-row" data-tooltip="Voltage threshold to correct differences" data-i18n-tooltip="tip.vthresh">
                        <label data-i18n="set.vthresh">Voltage Threshold</label>
                        <input type="number" value="0" min="0.00" max="50.00" step="0.01" id="VoltageThreshold">
                    </div>
                    <div class="settings-row" data-tooltip="First resistor value in ohms for voltage divider" data-i18n-tooltip="tip.r1">
                        <label data-i18n="set.r1">Resistor 1</label>
                        <input type="number" value="0" min="0" max="99999" id="Resistor1">
                    </div>
                    <div class="settings-row" data-tooltip="Second resistor value in ohms for voltage divider" data-i18n-tooltip="tip.r2">
                        <label data-i18n="set.r2">Resistor 2</label>
                        <input type="number" value="0" min="0" max="99999" id="Resistor2">
                    </div>
                </div>

                <!-- Tab: WiFi -->
                <div id="tab-wifi" class="tab-content">
                    <div class="settings-row" data-tooltip="Use Accesspoint, otherwise connect to an existing WiFi." data-i18n-tooltip="tip.ap">
                        <label data-i18n="set.ap">Use Accesspoint</label>
                        <label class="toggle-switch">
                            <input type="checkbox" value="0" id="Accesspoint">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-row" data-tooltip="Password for the Accesspoint access" data-i18n-tooltip="tip.appw">
                        <label data-i18n="set.appw">Accesspoint PW</label>
                        <input type="text" id="AccesspointPW">
                    </div>
                </div>

                <!-- Tab: Sensor -->
                <div id="tab-sensor" class="tab-content">
                    <h3 class="settings-section-head">MPU6050</h3>
                    <div class="settings-row" data-tooltip="Analog pin number for I2C SDA (0-36)" data-i18n-tooltip="tip.sda">
                        <label data-i18n="set.sda">SDA Pin</label>
                        <input type="number" value="0" min="0" max="36" id="SDAPin">
                    </div>
                    <div class="settings-row" data-tooltip="Analog pin number for I2C SCL (0-36)" data-i18n-tooltip="tip.scl">
                        <label data-i18n="set.scl">SCL Pin</label>
                        <input type="number" value="0" min="0" max="36" id="SCLPin">
                    </div>
                    <div class="settings-row" data-tooltip="I2C Adress (0-128)" data-i18n-tooltip="tip.i2c">
                        <label data-i18n="set.i2c">I²C Address</label>
                        <input type="number" value="0" min="0" max="128" id="I2CAdress">
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="settings-actions">
                    <button onclick="SetSetup()" id="SaveBtn" data-i18n="btn.save">Save</button>
                    <button onclick="Calibrate()" id="Calibrate" data-tooltip="Set the current level to Zero." data-i18n="btn.calibrate" data-i18n-tooltip="tip.calibrate">Calibrate</button>
                    <button onclick="Restart()" id="RestartBtn" data-tooltip="Restart the ESP32 device." data-i18n="btn.restart" data-i18n-tooltip="tip.restart">Restart</button>
                </div>

            </div>
        </div>
        <span id="Output"></span>
    </div>
    <div class="dimmer"></div>
</body>
</html>
