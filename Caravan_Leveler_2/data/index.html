<!DOCTYPE html>
<html lang="en">
<head>
   <title>Caravan - Leveler</title>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="mobile-web-app-capable" content="yes">
   <link rel="stylesheet" type="text/css" href="style.css">
   <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
   <link rel="icon" href="favicon.ico" type="image/x-icon">
   <script src="main.js"></script>
   <script src="i18n.js"></script>
   <script src="upload.js"></script>
   <script src="../logger.js"></script>
</head>
<body>   
   <div id="BurgerMenu">
      <div class="hamburger" id="hamburger-6" onclick="ToggleBurger()">
         <span class="line"></span>
         <span class="line"></span>
         <span class="line"></span>
      </div>
      <div id="myLinks">
         <button onclick="NavigateMenu('auto_level.html')" data-i18n="nav.level">Level</button><br>
         <button onclick="NavigateMenu('settings.html')" data-i18n="nav.settings">Settings</button><br>
         <button onclick="NavigateMenu('info.html')" data-i18n="nav.info">ESP32 Info</button><br>
         <button onclick="NavigateMenu('data.html')" data-i18n="nav.gyro">Gyroscope</button><br>
         <button onclick="NavigateMenu('voltage.html')" data-i18n="nav.voltage">Voltage</button><br>
         <button onclick="NavigateMenu('serial.html')" data-i18n="nav.serial">Serial</button><br>
         <br>
         <form action="upload" method="post" enctype="multipart/form-data" id="UploadForm">
               <div class="upload-btn-wrapper">
                  <button type="submit" data-i18n="nav.upload">Upload</button>
                  <label for="uploadFile"></label><input type="file" name="myfile" id="uploadFile" onchange="Upload()">
               </div>
            </form>
         <div class="lang-switcher">
            <button id="lang-btn-en" class="lang-btn" onclick="i18n.setLang('en'); var f=document.getElementById('subframe'); if(f) f.src=f.src;">🇬🇧 EN</button>
            <button id="lang-btn-de" class="lang-btn" onclick="i18n.setLang('de'); var f=document.getElementById('subframe'); if(f) f.src=f.src;">🇩🇪 DE</button>
         </div>
      </div>
   </div>
   <div class="iFrameDiv">
   <iframe name="subframe" id="subframe" title="Sub" src="auto_level.html"></iframe>
      <div class="dimmer">
         <div class="centered">
            <div id="fileName"></div>
            <div id="fileSize"></div>
            <div id="fileType"></div>
            <progress id="progress" style="margin-top:10px"></progress>
         </div>
      </div>
   </div>
</body>
</html>
